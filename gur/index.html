<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hund gefunden</title>

<style>
body{margin:0;font-family:Arial;background:#f0f9ff;display:flex;justify-content:center;padding:20px;}
.card{background:white;padding:30px;border-radius:20px;text-align:center;max-width:420px;}
img{width:90%;border-radius:14px;margin-bottom:20px;}
.button{display:block;padding:16px;margin:10px 0;color:white;text-decoration:none;border-radius:12px;}
.call{background:#06b6d4;}
.whatsapp{background:#22d3ee;}
.location{background:#bfdbfe;color:#1e3a8a;}
</style>

</head>

<body>

<div class="card">

<h2>🐶 Hund gefunden</h2>

<p>Hallo, mein Name ist gur</p>

<img src="dog.png">

<a class="button call" href="tel:++491701692197">📞 Anrufen</a>

<a class="button whatsapp" href="#" onclick="sendWhatsApp()">💬 WhatsApp</a>

<button class="button location" onclick="sendLocation()">📍 Standort</button>

<script>

function sendWhatsApp(){
const phone="+491701692197";
const message=`Hallo! Ich habe Ihren Hund gur gefunden 🐶`;
window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`);
}

function sendLocation(){
navigator.geolocation.getCurrentPosition(function(pos){
const lat = pos.coords.latitude;
const lon = pos.coords.longitude;

const phone="+491701692197";
const message=`https://maps.google.com/?q=${lat},${lon}`;

window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`);
});
}

</script>

</div>

</body>
</html>
