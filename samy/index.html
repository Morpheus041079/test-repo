<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hund gefunden</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f0f9ff;
color:#1e293b;
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
box-sizing:border-box;
}
.card{
background:white;
border-radius:20px;
padding:30px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}
.headline{font-size:30px;font-weight:800;margin-bottom:10px;}
.success{background:#e0f2fe;padding:10px;border-radius:10px;margin-bottom:15px;}
.dog-name{font-size:24px;font-weight:700;margin-bottom:15px;}
img{width:90%;border-radius:14px;margin-bottom:20px;}
.button{padding:16px;border-radius:12px;margin:10px 0;color:white;cursor:pointer;}
.call{background:#06b6d4;}
</style>
</head>

<body>

<div class="card">

<div class="headline">🐶 Hund gefunden?</div>

<div class="success">💙 Danke für deine Hilfe</div>

<div class="dog-name">sammmi</div>

<img src="dog.png">

<a class="button call" href="tel:+">
📞 Anrufen
</a>

</div>

</body>
</html>
